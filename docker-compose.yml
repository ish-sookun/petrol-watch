services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ""
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: petrol_watch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "5000:8080"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://root:@db:5432/petrol_watch
      - SECRET_KEY=dev-secret-key
    depends_on:
      - db
    volumes:
      - .:/app
    command: ["flask", "run", "--host=0.0.0.0", "--port=8080", "--reload"]

volumes:
  pgdata:
